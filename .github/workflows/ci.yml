name: CI

# Runs on every push to main + every PR. Tests against Node 20 (production
# target) and 22 (next LTS). prepublishOnly in package.json wires the same
# chain into `npm publish`, so a failing CI run also fails any subsequent
# release via .github/workflows/publish.yml.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Node ${{ matrix.node }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: ["20", "22"]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Smoke-test the bundled bin
        run: |
          node dist/bin.js --version
          node dist/bin.js --version --json
          node dist/bin.js --help
