name: Publish to npm

# Triggers on git tags matching v*.*.* (e.g. v0.1.1, v0.2.0).
# Workflow:
#   1. Check out the tagged commit.
#   2. Install deps (npm ci — exact match against package-lock.json).
#   3. `npm publish --access public --provenance` runs `prepublishOnly`
#      (lint + typecheck + test + build) before uploading.
#   4. The OIDC token (id-token: write) gives npm a signed attestation tying
#      the tarball to this exact workflow run / commit / repo — npm shows a
#      "Provenance" badge on the package page.
#
# Release flow from now on:
#   npm version patch && git push --follow-tags

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    name: Publish ${{ github.ref_name }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write   # required for npm provenance attestation
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Sanity-check tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME does not match package.json version $PKG_VERSION"
            exit 1
          fi
          echo "Publishing diffmode@$PKG_VERSION (tag $GITHUB_REF_NAME)"

      - name: Publish to npm
        run: npm publish --access public --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
